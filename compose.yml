# =============================================================================
# RentMaq Pro — Docker Compose
# Stack: .NET 8 API + PostgreSQL 16 / PostGIS 3.4
# Variables centralizadas en .env (ver .env.example como referencia)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16 + PostGIS 3.4 (requerido por ADR-001: GEOGRAPHY, ST_Covers)
  # Npgsql 8.0.x soporta PG 12–16; PG 16 es la versión estable más reciente.
  # ---------------------------------------------------------------------------
  db:
    image: postgis/postgis:16-3.4
    container_name: rentmaq-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # RentMaq API (.NET 8)
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: src/Dockerfile
      target: final
    container_name: rentmaq-api
    restart: unless-stopped
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ConnectionStrings__RentMaqDb: >-
        Host=db;Port=5432;Database=${DB_NAME};
        Username=${DB_USER};Password=${DB_PASSWORD}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
